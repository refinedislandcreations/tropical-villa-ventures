<!-- _includes/villa-card.html -->
{% assign section_data = include.section %}

<section id="our-villas" class="bg-[#F3F0E7] section overflow-hidden">
  <div class="max-w-screen-2xl mx-auto px-6 lg:px-8">
    <!-- Top content -->
    <div class="grid grid-cols-1 lg:grid-cols-12 gap-10 items-start mb-14">
      <div class="lg:col-span-4">
        <h2
          class="text-4xl sm:text-5xl md:text-6xl font-extralight tracking-wide text-[#231F20] uppercase font-heading leading-[1.1] md:leading-[0.95]"
        >
          {{ section_data.title }}
        </h2>
      </div>

      <div class="lg:col-span-6">
        <p
          class="text-[#231F20]/85 text-sm md:text-base leading-snug md:leading-snug max-w-3xl font-body"
        >
          {{ section_data.description }}
        </p>
      </div>

      <div class="lg:col-span-2 lg:flex lg:justify-end">
        <a
          href="{{ section_data.button_url | default: '/our-villas.html' | relative_url }}"
          class="inline-flex rounded-xl bg-[#9D8B2F] px-6 md:px-8 py-2.5 md:py-3 text-sm md:text-base font-heading font-medium uppercase tracking-widest hover:scale-105 transition-all duration-300 hover:bg-[#8B7A28] text-center min-w-[120px] text-white"
        >
          {{ section_data.button }}
        </a>
      </div>
    </div>

    <!-- Carousel Container - Consistent style across all devices -->
    <div class="relative">
      <!-- Single touch swipe container for ALL devices -->
      <div
        class="overflow-x-auto overflow-y-hidden snap-x snap-mandatory pb-4 -mx-6 px-6"
        id="villa-carousel-{{ section_data.title | slugify }}"
      >
        <div class="flex gap-6 w-max">
          {% for villa in section_data.items %}
          <article
            class="villa-card w-[280px] sm:w-[380px] md:w-[480px] lg:w-[540px] shrink-0 snap-start bg-gradient-to-r from-[#8F381B] to-[#D7661F] p-4 sm:p-6"
          >
            <a href="{{ villa.url | relative_url }}" class="block group">
              <div class="overflow-hidden">
                <img
                  src="{{ villa.image | relative_url }}"
                  alt="{{ villa.name }}"
                  class="w-full h-[200px] sm:h-[260px] md:h-[300px] lg:h-[320px] object-cover group-hover:scale-105 transition-transform duration-700"
                  loading="lazy"
                />
              </div>
              <div class="pt-4 sm:pt-6 text-white">
                <h3
                  class="text-2xl sm:text-3xl md:text-4xl lg:text-4xl font-extralight uppercase tracking-wide mb-2 sm:mb-3 font-heading leading-[1.1]"
                >
                  {{ villa.name }}
                </h3>
                <p
                  class="text-xs sm:text-sm md:text-base leading-snug sm:leading-snug text-white/90 max-w-[90%] font-body"
                >
                  {{ villa.description }}
                </p>
              </div>
            </a>
          </article>
          {% endfor %}
        </div>
      </div>
    </div>

    <!-- Scroll indicators -->
    <div
      class="flex justify-center mt-4 text-[#231F20]/50 text-xs sm:text-sm font-body"
    >
      <span>Swipe to explore villas</span>
    </div>
  </div>
</section>

<script>
  (function () {
    // Simple mobile-style swipe for all devices
    function initCarousel() {
      const carousel = document.querySelector(
        "#villa-carousel-{{ section_data.title | slugify }}",
      );
      if (!carousel) return;

      // Add momentum scrolling and smooth snapping
      carousel.style.webkitOverflowScrolling = "touch";
      carousel.style.scrollBehavior = "smooth";
    }

    // Initialize
    function init() {
      initCarousel();
    }

    if (document.readyState === "loading") {
      document.addEventListener("DOMContentLoaded", init);
    } else {
      init();
    }

    // Re-initialize on window resize to ensure proper behavior
    let resizeTimer;
    window.addEventListener("resize", () => {
      clearTimeout(resizeTimer);
      resizeTimer = setTimeout(() => {
        initCarousel();
      }, 200);
    });
  })();
</script>

<style>
  /* Carousel styling - consistent across all devices */
  #villa-carousel-{{ section_data.title | slugify }} {
    scrollbar-width: thin;
    scrollbar-color: #9d8b2f #e9e6de;
  }

  #villa-carousel-{{ section_data.title | slugify }}::-webkit-scrollbar {
    height: 4px;
  }

  #villa-carousel-{{ section_data.title | slugify }}::-webkit-scrollbar-track {
    background: #e9e6de;
    border-radius: 10px;
  }

  #villa-carousel-{{ section_data.title | slugify }}::-webkit-scrollbar-thumb {
    background: #9d8b2f;
    border-radius: 10px;
  }

  /* Snap scrolling */
  .snap-x {
    scroll-snap-type: x mandatory;
  }

  .snap-start {
    scroll-snap-align: start;
  }

  /* Smooth scrolling */
  .scroll-smooth {
    scroll-behavior: smooth;
  }
</style>
