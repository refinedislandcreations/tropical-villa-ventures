<script>
  document.addEventListener("DOMContentLoaded", () => {
    // Only initialize if we're on a page with gallery images
    const galleryTriggers = document.querySelectorAll(
      ".gallery-lightbox-trigger",
    );
    if (galleryTriggers.length === 0) return;

    // Create lightbox HTML
    const lightbox = document.createElement("div");
    lightbox.id = "custom-lightbox";
    lightbox.style.display = "none";
    lightbox.innerHTML = `
    <button class="lightbox-close">&times;</button>
    <button class="lightbox-prev">&#10094;</button>
    <img class="lightbox-img" src="" alt="" />
    <button class="lightbox-next">&#10095;</button>
  `;
    document.body.appendChild(lightbox);

    // Add CSS
    const style = document.createElement("style");
    style.textContent = `
    #custom-lightbox {
      position: fixed;
      top: 0;
      left: 0;
      width: 100%;
      height: 100%;
     background: linear-gradient(
        to right,
        rgba(175, 67, 29, 0.6),
        rgba(208, 98, 35, 0.4)
    );
    backdrop-filter: blur(1px);
    -webkit-backdrop-filter: blur(1px);
 
      z-index: 9999;
      justify-content: center;
      align-items: center;
    }
    #custom-lightbox.active {
      display: flex !important;
    }
    
    .lightbox-img {
      max-width: 90%;
      max-height: 80%;
      object-fit: contain;
    }
    
    .lightbox-close {
      position: absolute;
      top: 20px;
      right: 30px;
      font-size: 40px;
      color: black;
      border: none;
      cursor: pointer;
      z-index: 10000;
    }
    
    .lightbox-prev, .lightbox-next {
      position: absolute;
      top: 50%;
      transform: translateY(-50%);
      font-size: 40px;
      color: white;
      background: rgba(0, 0, 0, 0.5);
      border: none;
      cursor: pointer;
      padding: 20px 15px;
      z-index: 10000;
    }
    
    .lightbox-prev { left: 20px; }
    .lightbox-next { right: 20px; }
    
    @media (max-width: 768px) {
      .lightbox-prev, .lightbox-next { padding: 15px 10px; font-size: 30px; }
      .lightbox-close { font-size: 30px; top: 15px; right: 20px; }
    }
  `;
    document.head.appendChild(style);

    // Get elements
    const imgElement = lightbox.querySelector(".lightbox-img");
    const prevBtn = lightbox.querySelector(".lightbox-prev");
    const nextBtn = lightbox.querySelector(".lightbox-next");
    const closeBtn = lightbox.querySelector(".lightbox-close");

    let currentIndex = 0;
    let images = [];

    // Collect all gallery images
    galleryTriggers.forEach((trigger, idx) => {
      const imgSrc =
        trigger.getAttribute("href") || trigger.querySelector("img")?.src;

      images.push({
        src: imgSrc,
      });

      trigger.addEventListener("click", (e) => {
        e.preventDefault();
        e.stopPropagation();
        currentIndex = idx;
        openLightbox(currentIndex);
      });
    });

    function openLightbox(index) {
      if (!images[index]) return;
      imgElement.src = images[index].src;
      lightbox.style.display = "flex";
      lightbox.classList.add("active");
      document.body.style.overflow = "hidden";
    }

    function closeLightbox() {
      lightbox.style.display = "none";
      lightbox.classList.remove("active");
      document.body.style.overflow = "";
    }

    function showNext() {
      currentIndex = (currentIndex + 1) % images.length;
      openLightbox(currentIndex);
    }

    function showPrev() {
      currentIndex = (currentIndex - 1 + images.length) % images.length;
      openLightbox(currentIndex);
    }

    // Event listeners
    nextBtn.addEventListener("click", (e) => {
      e.stopPropagation();
      showNext();
    });
    prevBtn.addEventListener("click", (e) => {
      e.stopPropagation();
      showPrev();
    });
    closeBtn.addEventListener("click", closeLightbox);
    lightbox.addEventListener("click", (e) => {
      if (e.target === lightbox) closeLightbox();
    });

    document.addEventListener("keydown", (e) => {
      if (!lightbox.classList.contains("active")) return;
      if (e.key === "ArrowRight") showNext();
      if (e.key === "ArrowLeft") showPrev();
      if (e.key === "Escape") closeLightbox();
    });
  });
</script>
