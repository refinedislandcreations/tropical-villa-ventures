<!-- _includes/editorial-testimonials-carousel-section.html -->
<section class="bg-[#F3F0E7] section overflow-hidden">
  <div class="mx-auto max-w-screen-2xl px-6 lg:px-8">
    <!-- Title -->
    <div class="mb-16 lg:mb-20">
      <h2
        class="testimonial-split-title font-heading text-5xl md:text-6xl font-extralight uppercase tracking-wide text-neutral-900"
      >
        {{ include.section.title }}
      </h2>
    </div>

    <!-- Carousel -->
    <div class="overflow-hidden">
      <div id="testimonial-track" class="flex items-stretch">
        {% for item in include.section.items %}
        <div
          class="testimonial-slide min-w-full md:min-w-1/2 lg:min-w-1/3 px-6"
        >
          <article
            class="h-full max-h-[260px] flex flex-col justify-between border-r border-[#B55322] pr-10"
          >
            <div>
              <h3
                class="mb-6 font-heading text-4xl md:text-5xl font-extralight uppercase tracking-wide text-neutral-900"
              >
                {{ item.headline }}
              </h3>

              <p
                class="max-w-md text-base md:text-lg leading-8 text-neutral-700 font-body"
              >
                {{ item.quote }}
              </p>
            </div>

            <p
              class="w-full text-right text-sm tracking-wide text-neutral-600 font-body"
            >
              {{ item.author }} · {{ item.date }}
            </p>
          </article>
        </div>
        {% endfor %}
      </div>
    </div>
  </div>
</section>

<script>
  (function () {
    "use strict";

    // Wait for GSAP and ScrollTrigger to be ready
    function waitForGSAP() {
      if (typeof gsap !== "undefined" && typeof ScrollTrigger !== "undefined") {
        initTestimonialSlider();
        initTitleAnimation();
      } else {
        setTimeout(waitForGSAP, 100);
      }
    }

    if (document.readyState === "loading") {
      document.addEventListener("DOMContentLoaded", waitForGSAP);
    } else {
      waitForGSAP();
    }

    function initTitleAnimation() {
      const testimonialTitle = document.querySelector(
        ".testimonial-split-title",
      );
      if (!testimonialTitle) return;

      // Split the title into lines using GSAP
      const lines = testimonialTitle.innerText.split("\n");

      // Clear original content and wrap each line
      const originalText = testimonialTitle.innerText;
      testimonialTitle.innerHTML = originalText
        .split(" ")
        .map(
          (word) =>
            `<span class="word" style="display:inline-block; opacity:0; transform:translateY(30px);">${word}</span>`,
        )
        .join(" ");

      // Animate each word
      gsap.to(testimonialTitle.querySelectorAll(".word"), {
        scrollTrigger: {
          trigger: testimonialTitle,
          start: "top 85%",
          toggleActions: "play none none reverse",
        },
        duration: 0.8,
        y: 0,
        opacity: 1,
        stagger: 0.03,
        ease: "power2.out",
      });
    }

    function initTestimonialSlider() {
      const track = document.getElementById("testimonial-track");
      if (!track) return;

      const originalSlides = Array.from(track.children);
      if (!originalSlides.length) return;

      // Get slides per view based on screen size
      function getSlidesPerView() {
        if (window.innerWidth >= 1024) return 3;
        if (window.innerWidth >= 768) return 2;
        return 1;
      }

      let slidesPerView = getSlidesPerView();
      let isPlaying = true;
      let animation;

      // Clone slides for infinite effect
      function setupClones() {
        // Clear existing clones
        const originalCount = originalSlides.length;
        const clonesToAdd = slidesPerView;

        // Remove any existing clones
        while (track.children.length > originalSlides.length) {
          track.removeChild(track.lastChild);
        }

        // Add new clones
        for (let i = 0; i < clonesToAdd; i++) {
          track.appendChild(
            originalSlides[i % originalSlides.length].cloneNode(true),
          );
        }
      }

      // Create animation
      function createAnimation() {
        if (animation) animation.kill();

        const allSlides = Array.from(track.children);
        const slideWidth = 100 / slidesPerView;
        const totalSlides = allSlides.length;
        const totalWidth = totalSlides * slideWidth;

        // Calculate duration based on number of slides (slower for more slides)
        const duration = totalSlides * 3;

        // Set initial position
        gsap.set(track, { x: "0%" });

        // Create animation
        animation = gsap.to(track, {
          x: `-${totalWidth - slidesPerView * slideWidth}%`,
          duration: duration,
          ease: "none",
          repeat: -1,
          modifiers: {
            x: gsap.utils.unitize((x) => parseFloat(x) % totalWidth),
          },
        });
      }

      // Handle resize
      let resizeTimeout;
      function handleResize() {
        clearTimeout(resizeTimeout);
        resizeTimeout = setTimeout(() => {
          const newSlidesPerView = getSlidesPerView();
          if (newSlidesPerView !== slidesPerView) {
            slidesPerView = newSlidesPerView;
            setupClones();
            createAnimation();
            if (!isPlaying) animation.pause();
          }
        }, 250);
      }

      // Pause on hover
      track.addEventListener("mouseenter", () => {
        if (animation && isPlaying) {
          animation.pause();
          isPlaying = false;
        }
      });

      track.addEventListener("mouseleave", () => {
        if (animation && !isPlaying) {
          animation.resume();
          isPlaying = true;
        }
      });

      // Initialize
      setupClones();
      createAnimation();

      // Add resize listener
      window.addEventListener("resize", handleResize);

      // Refresh ScrollTrigger
      ScrollTrigger.refresh();
    }
  })();
</script>

<style>
  .testimonial-split-title .word {
    display: inline-block;
    opacity: 0;
    transform: translateY(30px);
  }

  /* Fallback if JS doesn't load */
  .testimonial-split-title {
    opacity: 1;
  }

  #testimonial-track > div {
    flex-shrink: 0;
  }

  /* Smooth hover pause/resume */
  #testimonial-track {
    cursor: grab;
  }

  #testimonial-track:active {
    cursor: grabbing;
  }
</style>
