# Site settings
title: Tropical Villa Ventures | Bali's Hidden Tropical Villas
email: management@tvvbali.com
description: >-
  Discover your dream Bali stay at our tropical villas in Uluwatu. Enjoy lush, tropical greenery with Balinese charm & hospitality.
baseurl: "" # the subpath of your site, e.g. /blog
url: "https://www.tvvbali.com" # the base hostname & protocol for your site

# SEO defaults
lang: en
author: Tropical Villa Ventures
logo: /assets/images/logo/tvv-logo.png

# Social
social:
  name: Tropical Villa Ventures
  links:
    - https://www.instagram.com/tvvbali/

# Default frontmatter values (CloudCannon + SEO)
defaults:
  - scope:
      path: ""
      type: "pages"
    values:
      layout: "default"
      description: "Private tropical villas in Ungasan, Bali. Book your perfect Bali getaway with Tropical Villa Ventures."
      og_image: "/assets/images/og-default.webp"

# Build settings
plugins:
  - jekyll-feed
  - jekyll-seo-tag
  - jekyll-sitemap

# Exclude from processing
exclude:
  - node_modules
  - package.json
  - package-lock.json
  - netlify.toml
  - netlify/
  - _netlify/
  - .env
  - .env.example
  - deno.lock
  - get-listings.js
  - test-*.js
  - Gemfile
  - Gemfile.lock
  - .gitignore
  - README.md
